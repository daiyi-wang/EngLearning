<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日10個英文單字挑戰</title>
  <style>
    :root {
      --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --primary:#2563eb; --success:#16a34a; --danger:#dc2626; --warning:#f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
      background:radial-gradient(circle at top,#dbeafe 0,#f6f7fb 45%,#fff 100%);
      color:var(--text);
      min-height:100vh;
    }
    header { padding:28px 16px 12px; text-align:center; }
    header h1 { margin:0; font-size:clamp(28px,5vw,44px); }
    header p { margin:10px auto 0; color:var(--muted); max-width:860px; line-height:1.7; }
    .app { width:min(980px,calc(100% - 28px)); margin:0 auto 40px; }
    .dashboard { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:18px 0; }
    .stat {
      background:rgba(255,255,255,.9); border:1px solid var(--line); border-radius:18px;
      padding:14px; box-shadow:0 10px 24px rgba(15,23,42,.06);
    }
    .stat b { display:block; font-size:22px; margin-bottom:4px; }
    .stat span { color:var(--muted); font-size:14px; }
    .card {
      background:rgba(255,255,255,.96); border:1px solid var(--line); border-radius:26px;
      padding:clamp(18px,4vw,34px); box-shadow:0 18px 48px rgba(15,23,42,.1);
    }
    .progress-wrap { width:100%; height:12px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin-bottom:24px; }
    .progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#60a5fa,#2563eb,#7c3aed); transition:width .35s ease; }
    .tag {
      display:inline-flex; padding:7px 12px; background:#eff6ff; color:#1d4ed8;
      border-radius:999px; font-weight:800; font-size:14px; margin-bottom:16px;
    }
    .word { font-size:clamp(44px,10vw,78px); font-weight:900; line-height:1; margin:4px 0 10px; }
    .meaning { font-size:24px; font-weight:900; margin:14px 0; }
    .meta { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 18px; }
    .meta span { background:#f1f5f9; border:1px solid #e2e8f0; padding:7px 10px; border-radius:999px; font-weight:800; font-size:14px; }
    .forms {
      background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; padding:12px 14px;
      border-radius:16px; line-height:1.7; margin:14px 0; font-weight:800;
    }
    .sentence {
      font-size:20px; line-height:1.6; background:#f9fafb; border:1px dashed #cbd5e1;
      padding:16px; border-radius:18px; margin:16px 0;
    }
    .sentence small { display:block; color:#475569; margin-top:6px; font-size:17px; font-weight:800; }
    .hint { color:var(--muted); line-height:1.7; margin:8px 0 18px; }
    .btns { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
    button {
      border:0; border-radius:14px; padding:12px 18px; font-size:16px; font-weight:900;
      cursor:pointer; background:var(--primary); color:#fff; box-shadow:0 9px 16px rgba(37,99,235,.2);
    }
    button.secondary { background:#e5e7eb; color:#111827; box-shadow:none; }
    button.success { background:var(--success); }
    button.warning { background:var(--warning); }
    .choice-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin:18px 0; }
    .choice { background:#f8fafc; color:#111827; border:2px solid #e5e7eb; box-shadow:none; text-align:left; }
    .choice.correct { background:#dcfce7; border-color:#22c55e; color:#14532d; }
    .choice.wrong { background:#fee2e2; border-color:#ef4444; color:#7f1d1d; }
    .review-grid, .mistake-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:18px; }
    .review-grid.five { grid-template-columns:repeat(5,minmax(0,1fr)); }
    .mini-card { border:1px solid #e5e7eb; border-radius:18px; padding:16px; background:#fbfdff; }
    .mini-card.mistake { background:#fff7ed; border-color:#fdba74; }
    .mini-card b { font-size:24px; }
    .mini-card .ipa { color:#64748b; font-weight:800; margin:4px 0; }
    .mini-card .zh { color:#334155; font-weight:900; margin-top:4px; }
    .mini-card .small-sentence { color:#475569; font-size:14px; line-height:1.5; margin-top:8px; border-top:1px solid #e5e7eb; padding-top:8px; }
    input[type="text"] {
      width:100%; padding:16px; font-size:24px; border:2px solid #cbd5e1; border-radius:16px;
      outline:none; margin:14px 0 6px; font-weight:900; letter-spacing:2px;
    }
    input[type="text"]:focus { border-color:#2563eb; box-shadow:0 0 0 4px rgba(37,99,235,.12); }
    .answer-box {
      background:#ecfeff; border:2px solid #67e8f9; color:#155e75; border-radius:18px;
      padding:14px 16px; font-weight:900; font-size:22px; margin:16px 0; text-align:center;
    }
    .feedback { min-height:32px; font-weight:900; margin-top:12px; line-height:1.6; }
    .feedback.ok { color:var(--success); }
    .feedback.no { color:var(--danger); }
    .feedback.info { color:#0369a1; }
    .finish { text-align:center; }
    .finish h2 { font-size:clamp(30px,6vw,56px); margin:0 0 12px; }
    .finish p { font-size:20px; color:var(--muted); line-height:1.7; }
    .confetti { font-size:48px; margin-bottom:10px; }
    .word-list { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:18px; text-align:left; }
    .word-pill { background:#f8fafc; border:1px solid #e5e7eb; padding:10px 12px; border-radius:12px; font-weight:800; line-height:1.5; }
    @media (max-width:900px) { .review-grid.five { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:720px) {
      .dashboard { grid-template-columns:repeat(2,1fr); }
      .choice-grid,.review-grid,.review-grid.five,.mistake-grid,.word-list { grid-template-columns:1fr; }
      button { width:100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>每日10個英文單字挑戰</h1>
    <p>每次學 5 個字，先選意思，再複習 5 個字，最後做拼字測驗。選義或拼字答錯的字會列入錯題，必須複習後再次測驗，全部通過才算完成。</p>
  </header>

  <main class="app">
    <section class="dashboard">
      <div class="stat"><b id="todayCount">10</b><span>今日單字</span></div>
      <div class="stat"><b id="wordIndex">1 / 10</b><span>目前進度</span></div>
      <div class="stat"><b id="score">0</b><span>答對次數</span></div>
      <div class="stat"><b id="stageName">學習</b><span>學習階段</span></div>
    </section>

    <section class="card">
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <div id="content"></div>
      <div class="feedback" id="feedback"></div>
    </section>
  </main>

  <script>
    const wordBank = [
{
      word: "plate",
      ipa: "/pleɪt/",
      pos: "名詞 n.",
      zh: "盤子",
      sentence: "The plate is white.",
      sentenceZh: "這個盤子是白色的。"
    },
    {
      word: "noodle",
      ipa: "/ˈnuːdəl/",
      pos: "名詞 n.",
      zh: "麵條",
      sentence: "I like noodles.",
      sentenceZh: "我喜歡麵條。"
    },
    {
      word: "pie",
      ipa: "/paɪ/",
      pos: "名詞 n.",
      zh: "派",
      sentence: "This pie is yummy.",
      sentenceZh: "這個派很好吃。"
    },
    {
      word: "piece",
      ipa: "/piːs/",
      pos: "名詞 n.",
      zh: "塊；片；張",
      sentence: "I want a piece of pie.",
      sentenceZh: "我想要一塊派。"
    },
    {
      word: "glass",
      ipa: "/ɡlæs/",
      pos: "名詞 n.",
      zh: "玻璃杯；玻璃",
      sentence: "I need a glass.",
      sentenceZh: "我需要一個玻璃杯。"
    },
    {
      word: "gram",
      ipa: "/ɡræm/",
      pos: "名詞 n.",
      zh: "公克",
      sentence: "I need ten grams.",
      sentenceZh: "我需要十公克。"
    },
    {
      word: "kilogram",
      ipa: "/ˈkɪləɡræm/",
      pos: "名詞 n.",
      zh: "公斤",
      sentence: "It is one kilogram.",
      sentenceZh: "它是一公斤。"
    },
    {
      word: "salt",
      ipa: "/sɔːlt/",
      pos: "名詞 n.",
      zh: "鹽",
      sentence: "Add some salt.",
      sentenceZh: "加一些鹽。"
    },
    {
      word: "sugar",
      ipa: "/ˈʃʊɡər/",
      pos: "名詞 n.",
      zh: "糖",
      sentence: "I need sugar.",
      sentenceZh: "我需要糖。"
    },
    {
      word: "a few",
      ipa: "/ə fjuː/",
      pos: "片語 phr.",
      zh: "幾個；一些",
      sentence: "I have a few books.",
      sentenceZh: "我有幾本書。"
    }
    ];

    const groupSize = 5;
    let mode = "groupLearn";
    let groupStart = 0;
    let learnPointer = 0;
    let quizOrder = [];
    let quizPointer = 0;
    let spellOrder = [];
    let spellPointer = 0;
    let score = 0;
    let spellingTries = 0;
    let answerShown = false;
    let locked = false;

    let groupMistakes = new Set();
    let currentRoundMistakes = new Set();
    let retryIndices = [];
    let isRetryRound = false;

    const content = document.getElementById("content");
    const feedback = document.getElementById("feedback");
    const wordIndex = document.getElementById("wordIndex");
    const scoreEl = document.getElementById("score");
    const stageName = document.getElementById("stageName");
    const progressBar = document.getElementById("progressBar");

    function escapeAttr(text) {
      return String(text).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;");
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("這個瀏覽器暫時不支援語音播放。");
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      utter.rate = 0.82;
      utter.pitch = 1;
      window.speechSynthesis.speak(utter);
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function currentGroupEnd() {
      return Math.min(groupStart + groupSize, wordBank.length);
    }

    function groupIndices() {
      return [...Array(currentGroupEnd() - groupStart).keys()].map(i => groupStart + i);
    }

    function markMistake(index) {
      groupMistakes.add(index);
      currentRoundMistakes.add(index);
    }

    function updateTop() {
      let displayIndex = 1;
      if (mode === "groupLearn") displayIndex = learnPointer + 1;
      else if (mode === "meaningQuiz") displayIndex = isRetryRound ? currentGroupEnd() : groupStart + quizPointer + 1;
      else if (mode === "groupReview") displayIndex = currentGroupEnd();
      else if (mode === "spellQuiz") displayIndex = isRetryRound ? currentGroupEnd() : groupStart + spellPointer + 1;
      else displayIndex = wordBank.length;

      wordIndex.textContent = `${Math.min(displayIndex, wordBank.length)} / ${wordBank.length}`;
      scoreEl.textContent = score;

      if (mode === "groupLearn") stageName.textContent = "學習";
      else if (mode === "meaningQuiz") stageName.textContent = isRetryRound ? "錯題選義" : "選意思";
      else if (mode === "groupReview") stageName.textContent = isRetryRound ? "錯題複習" : "再記一次";
      else if (mode === "spellQuiz") stageName.textContent = isRetryRound ? "錯題拼字" : "拼單字";
      else stageName.textContent = "完成";

      const groupNo = Math.floor(groupStart / groupSize);
      const groupBase = groupNo * 50;
      const withinGroupCount = currentGroupEnd() - groupStart;
      let progress = 0;

      if (mode === "groupLearn") progress = groupBase + ((learnPointer - groupStart) / withinGroupCount) * 15;
      else if (mode === "meaningQuiz") progress = groupBase + 15 + (quizPointer / Math.max(1, quizOrder.length)) * 15;
      else if (mode === "groupReview") progress = groupBase + 30;
      else if (mode === "spellQuiz") progress = groupBase + 32 + (spellPointer / Math.max(1, spellOrder.length)) * 18;
      else progress = 100;

      progressBar.style.width = `${Math.min(100, progress)}%`;
    }

    function clearFeedback() {
      feedback.textContent = "";
      feedback.className = "feedback";
    }

    function verbFormsHtml(item) {
      if (!item.forms) return "";
      return `<div class="forms">動詞變化：現在分詞 ${item.forms.ing} ／ 過去式 ${item.forms.past} ／ 過去分詞 ${item.forms.pp}</div>`;
    }

    function wordInfoHtml(item, showForms = true) {
      return `
        <div class="word">${item.word}</div>
        <div class="meta"><span>音標 ${item.ipa}</span><span>${item.pos}</span></div>
        <div class="meaning">${item.zh}</div>
        ${showForms ? verbFormsHtml(item) : ""}
        <div class="sentence">${item.sentence}<small>${item.sentenceZh}</small></div>
      `;
    }

    function showGroupLearn() {
      mode = "groupLearn";
      isRetryRound = false;
      locked = false;
      clearFeedback();
      updateTop();

      const item = wordBank[learnPointer];
      const groupNo = Math.floor(groupStart / groupSize) + 1;
      const groupEnd = currentGroupEnd();

      content.innerHTML = `
        <div class="tag">第 ${groupNo} 組單字：先學第 ${learnPointer - groupStart + 1} / ${groupEnd - groupStart} 個</div>
        ${wordInfoHtml(item, true)}
        <p class="hint">請看音標、詞性、例句和動詞變化。這一組 5 個字學完後，才會一起測驗。</p>
        <div class="btns">
          <button onclick="speak('${escapeAttr(item.word)}')">播放單字發音</button>
          <button class="secondary" onclick="speak('${escapeAttr(item.sentence)}')">播放例句</button>
          <button class="success" onclick="nextLearnWord()">下一個單字</button>
        </div>
      `;
    }

    function nextLearnWord() {
      learnPointer++;
      if (learnPointer < currentGroupEnd()) showGroupLearn();
      else startMeaningQuiz(groupIndices(), false);
    }

    function startMeaningQuiz(indices, retry = false) {
      mode = "meaningQuiz";
      isRetryRound = retry;
      retryIndices = retry ? indices : retryIndices;
      quizOrder = shuffle(indices);
      quizPointer = 0;
      currentRoundMistakes = new Set();
      showMeaningQuiz();
    }

    function showMeaningQuiz() {
      locked = false;
      clearFeedback();
      updateTop();

      const index = quizOrder[quizPointer];
      const item = wordBank[index];
      const baseIndices = isRetryRound ? retryIndices : groupIndices();
      const baseItems = baseIndices.map(i => wordBank[i]);
      const outsideItems = wordBank.filter(w => w.word !== item.word);
      const wrongPool = shuffle([
        ...baseItems.filter(w => w.word !== item.word).map(w => w.zh),
        ...outsideItems.map(w => w.zh)
      ]);
      const options = shuffle([item.zh, ...wrongPool.slice(0, 3)]);

      content.innerHTML = `
        <div class="tag">${isRetryRound ? "錯題重測" : "第 " + (Math.floor(groupStart / groupSize) + 1) + " 組小測驗"}：選出意思 ${quizPointer + 1} / ${quizOrder.length}</div>
        <div class="word">${item.word}</div>
        <div class="meta"><span>音標 ${item.ipa}</span><span>${item.pos}</span></div>
        <p class="hint">${isRetryRound ? "這是剛剛答錯的字，請再選一次中文意思。" : "請選出這個單字的中文意思。"}</p>
        <div class="btns"><button onclick="speak('${escapeAttr(item.word)}')">再聽一次</button></div>
        <div class="choice-grid">
          ${options.map(opt => `<button class="choice" onclick="checkMeaning(this, '${escapeAttr(opt)}')">${opt}</button>`).join("")}
        </div>
      `;
    }

    function checkMeaning(btn, answer) {
      if (locked) return;
      locked = true;

      const index = quizOrder[quizPointer];
      const item = wordBank[index];
      const buttons = document.querySelectorAll(".choice");

      buttons.forEach(b => {
        if (b.textContent === item.zh) b.classList.add("correct");
        if (b === btn && answer !== item.zh) b.classList.add("wrong");
      });

      if (answer === item.zh) {
        score++;
        feedback.textContent = "答對了！";
        feedback.className = "feedback ok";
      } else {
        markMistake(index);
        feedback.textContent = `這題是「${item.zh}」。這個字會列入錯題，等一下要再複習、再測一次。`;
        feedback.className = "feedback no";
      }

      updateTop();

      setTimeout(() => {
        quizPointer++;
        if (quizPointer < quizOrder.length) {
          showMeaningQuiz();
        } else {
          if (isRetryRound) showMistakeReviewBeforeSpell();
          else showGroupReview();
        }
      }, 1200);
    }

    function showGroupReview() {
      mode = "groupReview";
      isRetryRound = false;
      locked = false;
      clearFeedback();
      updateTop();

      const items = wordBank.slice(groupStart, currentGroupEnd());
      const groupNo = Math.floor(groupStart / groupSize) + 1;

      content.innerHTML = `
        <div class="tag">第 ${groupNo} 組：拼字前再記一次</div>
        <h2 style="margin:0 0 8px;">請再看一次這 5 個單字</h2>
        <p class="hint">接下來會測這 5 個字的拼寫。拼字測驗時不會顯示動詞變化。</p>
        <div class="review-grid five">
          ${items.map(item => `
            <div class="mini-card">
              <b>${item.word}</b>
              <div class="ipa">${item.ipa}</div>
              <div class="zh">${item.pos}｜${item.zh}</div>
              ${item.forms ? `<div class="small-sentence">動詞變化：${item.forms.ing}／${item.forms.past}／${item.forms.pp}</div>` : ""}
              <div class="small-sentence">${item.sentence}<br>${item.sentenceZh}</div>
              <div class="btns"><button class="secondary" onclick="speak('${escapeAttr(item.word)}')">聽</button></div>
            </div>
          `).join("")}
        </div>
        <div class="btns"><button class="success" onclick="startGroupSpellQuiz()">開始這 5 個字的拼字測驗</button></div>
      `;
    }

    function startGroupSpellQuiz() {
      mode = "spellQuiz";
      isRetryRound = false;
      spellOrder = shuffle(groupIndices());
      spellPointer = 0;
      spellingTries = 0;
      answerShown = false;
      showSpellQuiz();
    }

    function showMistakeReview() {
      mode = "groupReview";
      isRetryRound = true;
      locked = false;
      clearFeedback();
      updateTop();

      retryIndices = [...groupMistakes];
      const items = retryIndices.map(i => wordBank[i]);

      content.innerHTML = `
        <div class="tag">錯題複習</div>
        <h2 style="margin:0 0 8px;">這些字剛剛答錯了，請再背一次</h2>
        <p class="hint">看過答案或照著打不算真正會。請重新記住意思和拼法，接著會再次測驗這些錯題。</p>
        <div class="mistake-grid">
          ${items.map(item => `
            <div class="mini-card mistake">
              <b>${item.word}</b>
              <div class="ipa">${item.ipa}</div>
              <div class="zh">${item.pos}｜${item.zh}</div>
              <div class="small-sentence">${item.sentence}<br>${item.sentenceZh}</div>
              <div class="btns"><button class="secondary" onclick="speak('${escapeAttr(item.word)}')">聽發音</button></div>
            </div>
          `).join("")}
        </div>
        <div class="btns"><button class="success" onclick="startMeaningQuiz(retryIndices, true)">重新測驗錯題</button></div>
      `;
    }

    function showMistakeReviewBeforeSpell() {
      mode = "groupReview";
      isRetryRound = true;
      locked = false;
      clearFeedback();
      updateTop();

      const items = retryIndices.map(i => wordBank[i]);

      content.innerHTML = `
        <div class="tag">錯題拼字前再記一次</div>
        <h2 style="margin:0 0 8px;">接著拼這些錯題</h2>
        <p class="hint">請再看一次拼法。下一頁開始不會顯示英文單字，也不會顯示動詞變化。</p>
        <div class="mistake-grid">
          ${items.map(item => `
            <div class="mini-card mistake">
              <b>${item.word}</b>
              <div class="ipa">${item.ipa}</div>
              <div class="zh">${item.pos}｜${item.zh}</div>
              <div class="small-sentence">${item.sentence}<br>${item.sentenceZh}</div>
              <div class="btns"><button class="secondary" onclick="speak('${escapeAttr(item.word)}')">聽發音</button></div>
            </div>
          `).join("")}
        </div>
        <div class="btns"><button class="success" onclick="startRetrySpellQuiz()">開始錯題拼字重測</button></div>
      `;
    }

    function startRetrySpellQuiz() {
      mode = "spellQuiz";
      isRetryRound = true;
      spellOrder = shuffle(retryIndices);
      spellPointer = 0;
      spellingTries = 0;
      answerShown = false;
      currentRoundMistakes = new Set();
      showSpellQuiz();
    }

    function showSpellQuiz() {
      locked = false;
      clearFeedback();
      updateTop();

      const index = spellOrder[spellPointer];
      const item = wordBank[index];
      const hiddenSentence = item.sentence.replace(new RegExp(item.word, "gi"), "_____");
      const answerBox = answerShown
        ? `<div class="answer-box">答案是：${item.word}</div><p class="hint">請看著答案唸一次，然後再輸入一次。注意：這個字仍然會保留在錯題，等一下還要再測一次。</p>`
        : "";

      content.innerHTML = `
        <div class="tag">${isRetryRound ? "錯題拼寫重測" : "第 " + (Math.floor(groupStart / groupSize) + 1) + " 組拼寫挑戰"}：第 ${spellPointer + 1} / ${spellOrder.length} 題</div>
        <div class="meaning">${item.zh}</div>
        <div class="meta"><span>音標 ${item.ipa}</span><span>${item.pos}</span></div>
        <div class="sentence">${hiddenSentence}<small>${item.sentenceZh}</small></div>
        ${answerBox}
        <p class="hint">請拼出這個英文單字。錯 3 次會先給答案讓你完成本題，但這個字會被列入錯題，稍後必須重新測驗。</p>
        <input id="spellInput" type="text" autocomplete="off" placeholder="Type the word here" />
        <div class="btns">
          <button onclick="speak('${escapeAttr(item.word)}')">聽發音提示</button>
          <button class="success" onclick="checkSpelling()">確認答案</button>
          <button class="secondary" onclick="showFirstLetter()">給我提示</button>
          ${answerShown ? `<button class="warning" onclick="speak('${escapeAttr(item.word)}')">看答案後再聽一次</button>` : ""}
        </div>
      `;

      const input = document.getElementById("spellInput");
      input.focus();
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") checkSpelling();
      });
    }

    function showFirstLetter() {
      const item = wordBank[spellOrder[spellPointer]];
      feedback.textContent = `提示：第一個字母是 ${item.word[0].toUpperCase()}，共有 ${item.word.length} 個字母。`;
      feedback.className = "feedback info";
    }

    function checkSpelling() {
      if (locked) return;

      const index = spellOrder[spellPointer];
      const item = wordBank[index];
      const input = document.getElementById("spellInput");
      const answer = input.value.trim().toLowerCase();

      if (answer === item.word.toLowerCase()) {
        locked = true;
        score++;
        feedback.textContent = answerShown
          ? `你已經照著答案完成 ${item.word}，但因為前面拼錯，等一下仍要再測一次。`
          : `太棒了！你成功拼出 ${item.word}。`;
        feedback.className = answerShown ? "feedback info" : "feedback ok";
        updateTop();

        setTimeout(() => {
          spellPointer++;
          spellingTries = 0;
          answerShown = false;
          if (spellPointer >= spellOrder.length) finishSpellRound();
          else showSpellQuiz();
        }, 1000);
        return;
      }

      markMistake(index);
      spellingTries++;

      if (spellingTries >= 3 && !answerShown) {
        answerShown = true;
        feedback.textContent = `先不要卡住。請看答案「${item.word}」，唸一次，再重新輸入。本字仍會列入錯題重測。`;
        feedback.className = "feedback info";
        setTimeout(showSpellQuiz, 1200);
      } else if (answerShown) {
        feedback.textContent = `請照著答案再輸入一次：${item.word}。完成後，等一下還要重新測這個字。`;
        feedback.className = "feedback info";
        input.select();
      } else {
        const left = 3 - spellingTries;
        feedback.textContent = `還不完全正確。再試一次，還有 ${left} 次機會後會顯示答案，但本字會列入錯題。`;
        feedback.className = "feedback no";
        input.select();
      }
    }

    function finishSpellRound() {
      if (isRetryRound) {
        if (currentRoundMistakes.size > 0) {
          groupMistakes = new Set(currentRoundMistakes);
          showMistakeReview();
        } else {
          groupMistakes.clear();
          finishGroup();
        }
      } else {
        if (groupMistakes.size > 0) showMistakeReview();
        else finishGroup();
      }
    }

    function finishGroup() {
      const groupEnd = currentGroupEnd();

      if (groupEnd < wordBank.length) {
        content.innerHTML = `
          <div class="finish">
            <div class="confetti">✅</div>
            <h2>這一組完成了！</h2>
            <p>你已經完成第 ${Math.floor(groupStart / groupSize) + 1} 組的選意思、總複習和拼字測驗。</p>
            <p>所有錯題也都重新測驗通過了。</p>
            <div class="btns" style="justify-content:center;"><button class="success" onclick="goNextGroup()">開始下一組</button></div>
          </div>
        `;
        clearFeedback();
        updateTop();
      } else {
        showFinish();
      }
    }

    function goNextGroup() {
      groupStart = currentGroupEnd();
      learnPointer = groupStart;
      quizOrder = [];
      quizPointer = 0;
      spellOrder = [];
      spellPointer = 0;
      spellingTries = 0;
      answerShown = false;
      groupMistakes = new Set();
      currentRoundMistakes = new Set();
      retryIndices = [];
      isRetryRound = false;
      showGroupLearn();
    }

    function showFinish() {
      mode = "finish";
      clearFeedback();
      progressBar.style.width = "100%";
      wordIndex.textContent = `${wordBank.length} / ${wordBank.length}`;
      stageName.textContent = "完成";
      content.innerHTML = `
        <div class="finish">
          <div class="confetti">🎉🏆✨</div>
          <h2>你很棒！</h2>
          <p>今天多記了 ${wordBank.length} 個單字。</p>
          <p>你已經完成今天的英文單字任務，而且所有錯題都重新測驗通過了。</p>
          <div class="word-list">
            ${wordBank.map(w => `<div class="word-pill">
              ${w.word} ${w.ipa}<br>
              ${w.pos}｜${w.zh}<br>
              <span style="color:#64748b;">${w.sentence}（${w.sentenceZh}）</span>
            </div>`).join("")}
          </div>
          <div class="btns" style="justify-content:center;"><button class="secondary" onclick="restartLearning()">重新練習</button></div>
        </div>
      `;
    }

    function restartLearning() {
      mode = "groupLearn";
      groupStart = 0;
      learnPointer = 0;
      quizOrder = [];
      quizPointer = 0;
      spellOrder = [];
      spellPointer = 0;
      score = 0;
      spellingTries = 0;
      answerShown = false;
      locked = false;
      groupMistakes = new Set();
      currentRoundMistakes = new Set();
      retryIndices = [];
      isRetryRound = false;
      showGroupLearn();
    }

    showGroupLearn();
  </script>
</body>
</html>
