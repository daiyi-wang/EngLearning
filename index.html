<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#eaf5ff">
  <title>每日十字｜英文單字練習</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2319324d'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='32' fill='white'%3EAa%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=20260714-2">
</head>
<body>
  <div class="page-shell">
    <header class="masthead">
      <a class="brand" href="./" aria-label="回到今天">
        <span class="brand-mark" aria-hidden="true">Aa</span>
        <span><b>每日十字</b><small>Weekday word practice</small></span>
      </a>
      <div class="date-tools">
        <label for="datePicker">選擇日期</label>
        <input id="datePicker" type="date">
        <button id="todayButton" class="text-button" type="button">回到今天</button>
      </div>
    </header>

    <main>
      <section class="day-heading" aria-labelledby="dayTitle">
        <div>
          <p id="dayEyebrow" class="eyebrow">讀取單字庫中</p>
          <h1 id="dayTitle">準備今天的 10 個字…</h1>
          <p id="daySummary" class="day-summary">資料會直接從 wordlist.json 載入。</p>
        </div>
        <div class="day-stamp" aria-hidden="true">
          <span id="stampMonth">JUL</span>
          <strong id="stampDay">15</strong>
          <small id="stampWeekday">WED</small>
        </div>
      </section>

      <section id="app" class="workbook" aria-live="polite">
        <div class="loading-state">
          <span class="loading-dot"></span>
          正在整理今天的單字
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span id="bankStatus">單字庫讀取中</span>
      <div class="footer-actions">
        <button id="exportButton" class="text-button" type="button">備份學習進度</button>
        <label class="text-button file-button" for="importInput">匯入學習進度</label>
        <input id="importInput" type="file" accept="application/json" hidden>
      </div>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js?v=20260714-2" defer></script>
</body>
</html>
